<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Challenge: Nothing to Billionaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <header class="text-center mb-4">
            <h1 class="display-5 fw-bold text-primary">BitLife: The Challenge</h1>
            <p class="lead">From Nothing to Billionaire... or the Throne.</p>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Profile</h5>
                        <hr>
                        <p><strong>Name:</strong> <span id="stat-name">-</span></p>
                        <p><strong>Age:</strong> <span id="stat-age">0</span></p>
                        <p><strong>Bank:</strong> <span class="text-success">$<span id="stat-bank">0</span></span></p>
                        <div class="mb-2">
                            <label class="small fw-bold">Health</label>
                            <div class="progress"><div id="bar-health" class="progress-bar bg-danger" style="width: 100%"></div></div>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">Smarts</label>
                            <div class="progress"><div id="bar-smarts" class="progress-bar bg-info" style="width: 50%"></div></div>
                        </div>
                    </div>
                </div>

                <button id="btn-age" class="btn btn-primary btn-lg w-100 py-3 mb-3">Age (+1 Year)</button>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold">Life Log</div>
                    <div id="life-log" class="card-body overflow-auto" style="height: 400px; background: #fdfdfd;">
                        </div>
                    <div class="card-footer bg-white">
                        <div class="d-flex gap-2">
                            <button id="btn-job" class="btn btn-outline-secondary btn-sm">Find Job</button>
                            <button id="btn-education" class="btn btn-outline-secondary btn-sm">Education</button>
                            <button id="btn-royal" class="btn btn-outline-warning btn-sm">Seek Royalty</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="constants.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
</body>
</html>
